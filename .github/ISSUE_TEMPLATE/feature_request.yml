name: Feature request
description: Suggest an idea or improvement for Social Stats
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? Who benefits?
      placeholder: As an agency managing multiple clients, I'd like to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Analytics dashboard
        - Composer / scheduling / content calendar
        - Inbox
        - WhatsApp bot builder
        - Agency / marketplace
        - AI assistant
        - New platform integration
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false
