
# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.socialstats.app api.socialstats.app;

    # Allow ACME challenge for Let's Encrypt cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Permanent redirect everything else to HTTPS
    location / { return 301 https://$host$request_uri; }
}

# ── API server (api.socialstats.app) ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.socialstats.app;

    # ── TLS ───────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.socialstats.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.socialstats.app/privkey.pem;

    # TLS 1.3 only (Mozilla Modern). Drop 1.2 once user analytics confirm
    # zero TLS-1.2-only clients (Cloudflare reports per-zone).
    ssl_protocols TLSv1.3;

    # TLS 1.3 cipher suites are negotiated client-side; ssl_ciphers ignored.
    ssl_prefer_server_ciphers off;

    # OCSP stapling — saves clients a network round-trip
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/api.socialstats.app/chain.pem;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # Session resumption (saves a full handshake on repeat visits)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers (Stage 6's middleware sets app-level; nginx
    #    sets perimeter-level so static files + 5xx pages are also covered)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ── Body limits (defence vs upload-bomb DoS) ──────────────────────────
    client_max_body_size 30M;          # matches Stage 5 SecureFileUpload max
    client_body_timeout 30s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # ── Rate limit (perimeter — app-layer DRF throttles still apply) ──────
    # 200 req/min/IP for API. Bursts up to 50 absorbed without delay.
    limit_req_zone $binary_remote_addr zone=api:20m rate=200r/m;

    # ── Backend ───────────────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        # Pass the upstream request-id back through (Stage 6 RequestIDMiddleware)
        proxy_pass_header X-Request-ID;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # WebSocket upgrade for Channels (Stage 14: realtime)
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # Block well-known scanner targets — return 444 (no response)
    location ~ ^/(\.git|\.env|wp-admin|wp-login\.php|phpmyadmin) { return 444; }
}

# ── Frontend (app.socialstats.app) ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.socialstats.app;

    ssl_certificate     /etc/letsencrypt/live/app.socialstats.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.socialstats.app/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/socialstats/frontend;
    index index.html;

    # Long-cache hashed assets, no-cache the index
    location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Surface SECURITY.md / security.txt for researchers
    location = /.well-known/security.txt {
        alias /var/www/socialstats/frontend/.well-known/security.txt;
    }
}
